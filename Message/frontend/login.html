<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mensajería</title>
</head>

<body>

    <div id="login-form">
        <h2>Iniciar sesión</h2>
        <label for="username">Correo electrónico</label><br>
        <input id="username" type="email" placeholder="tucorreo@ejemplo.com" autocomplete="email"><br><br>

        <label for="password">Contraseña</label><br>
        <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password"><br><br>

        <button onclick="login()">Ingresar</button>
        <p>¿No tienes cuenta? <a href="#" onclick="toggleForms()">Regístrate aquí</a></p>
    </div>

    <div id="register-form" style="display: none;">
        <h2>Registro de usuario</h2>
        <label for="reg-username">Nombre de usuario</label><br>
        <input id="reg-username" type="text" placeholder="Nombre de usuario"><br><br>

        <label for="reg-email">Correo electrónico</label><br>
        <input id="reg-email" type="email" placeholder="tucorreo@ejemplo.com"><br><br>

        <label for="reg-password">Contraseña</label><br>
        <input id="reg-password" type="password" placeholder="Contraseña"><br><br>

        <button onclick="register()">Registrarse</button>
        <p>¿Ya tienes cuenta? <a href="#" onclick="toggleForms()">Inicia sesión aquí</a></p>
    </div>

    <p id="message" style="color: red;"></p>

    <script src="login.js?v=2"></script>

</body>

</html>
